<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品列表 - 云商</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- 头部 -->
  <header class="header" id="header">
    <div class="container">
      <div class="header-inner">
        <a href="index.html" class="logo">云商</a>
        <nav class="nav" id="nav">
          <ul class="nav-list">
            <li><a href="index.html">首页</a></li>
            <li><a href="products.html" class="active">商品列表</a></li>
            <li><a href="category.html">分类</a></li>
            <li><a href="about.html">关于我们</a></li>
            <li><a href="contact.html">联系我们</a></li>
          </ul>
        </nav>
        <div class="header-actions">
          <form class="search-form" action="search.html" method="get">
            <input type="text" placeholder="搜索商品..." name="q">
            <button type="submit">
              <svg viewBox="0 0 24 24" width="20" height="20"><circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2"/><line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2"/></svg>
            </button>
          </form>
          <a href="cart.html" class="cart-icon">
            <svg viewBox="0 0 24 24" width="24" height="24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" fill="none" stroke="currentColor" stroke-width="2"/><line x1="3" y1="6" x2="21" y2="6" stroke="currentColor" stroke-width="2"/><path d="M16 10a4 4 0 01-8 0" fill="none" stroke="currentColor" stroke-width="2"/></svg>
            <span class="cart-badge" id="cartBadge">0</span>
          </a>
          <a href="login.html" class="user-icon">
            <svg viewBox="0 0 24 24" width="24" height="24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="7" r="4" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </a>
        </div>
        <button class="mobile-toggle" id="mobileToggle">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- 主内容 -->
  <main class="main-content">
    <div class="container">
      <!-- 页面标题 -->
      <div class="page-header">
        <h1>全部商品</h1>
        <p class="breadcrumb">首页 &gt; 商品列表</p>
      </div>

      <!-- 筛选和排序 -->
      <div class="filter-bar">
        <div class="filter-categories">
          <button class="filter-btn active" data-filter="all">全部</button>
          <button class="filter-btn" data-filter="electronics">数码电子</button>
          <button class="filter-btn" data-filter="clothing">服装服饰</button>
          <button class="filter-btn" data-filter="home">家居用品</button>
          <button class="filter-btn" data-filter="beauty">美妆护肤</button>
          <button class="filter-btn" data-filter="sports">运动户外</button>
        </div>
        <div class="filter-sort">
          <select id="sortSelect">
            <option value="default">默认排序</option>
            <option value="price-asc">价格从低到高</option>
            <option value="price-desc">价格从高到低</option>
            <option value="sales">销量优先</option>
          </select>
        </div>
      </div>

      <!-- 商品网格 -->
      <div class="product-grid" id="productGrid"></div>

      <!-- 分页 -->
      <div class="pagination">
        <a href="#" class="page-btn disabled">上一页</a>
        <a href="#" class="page-btn active">1</a>
        <a href="#" class="page-btn">2</a>
        <a href="#" class="page-btn">3</a>
        <a href="#" class="page-btn">下一页</a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-col">
          <h4>关于我们</h4>
          <ul>
            <li><a href="about.html">公司介绍</a></li>
            <li><a href="about.html#culture">企业文化</a></li>
            <li><a href="about.html#team">团队成员</a></li>
            <li><a href="about.html#careers">加入我们</a></li>
          </ul>
        </div>
        <div class="footer-col">
          <h4>客户服务</h4>
          <ul>
            <li><a href="help.html">帮助中心</a></li>
            <li><a href="shipping.html">配送说明</a></li>
            <li><a href="return.html">退换政策</a></li>
            <li><a href="contact.html">联系客服</a></li>
          </ul>
        </div>
        <div class="footer-col">
          <h4>支付方式</h4>
          <ul>
            <li><a href="payment.html">支付方式</a></li>
            <li><a href="coupon.html">优惠券</a></li>
            <li><a href="points.html">积分商城</a></li>
            <li><a href="giftcard.html">礼品卡</a></li>
          </ul>
        </div>
        <div class="footer-col">
          <h4>关注我们</h4>
          <div class="social-links">
            <a href="#" class="social-icon">📱</a>
            <a href="#" class="social-icon">💬</a>
            <a href="#" class="social-icon">📧</a>
          </div>
          <p class="footer-contact">客服热线：400-888-8888</p>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 云商科技版权所有 | <a href="privacy.html">隐私政策</a> | <a href="terms.html">服务条款</a></p>
      </div>
    </div>
  </footer>

  <!-- 购物车侧边栏 -->
  <div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h3>购物车</h3>
      <button class="cart-close" id="cartClose">×</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>合计：</span>
        <span id="cartTotal">¥0.00</span>
      </div>
      <a href="checkout.html" class="btn btn-primary btn-block">去结算</a>
    </div>
  </div>
  <div class="cart-overlay" id="cartOverlay"></div>

  <script src="js/main.js"></script>
  <script>
    // 筛选功能
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        const filter = this.dataset.filter;
        
        // 这里可以添加实际的筛选逻辑
        // 目前只是演示 UI
      });
    });
  </script>
</body>
</html>
