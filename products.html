      </div>
    </div>
  </header>

  <!-- 主内容 -->
  <main class="main-content">
    <div class="container">
      <!-- 页面标题 -->
      <div class="page-header">
        <h1>全部商品</h1>
        <p class="breadcrumb">首页 &gt; 商品列表</p>
      </div>

      <!-- 筛选和排序 -->
      <div class="filter-bar">
        <div class="filter-categories">
          <button class="filter-btn active" data-filter="all">全部</button>
          <button class="filter-btn" data-filter="electronics">数码电子</button>
          <button class="filter-btn" data-filter="clothing">服装服饰</button>
          <button class="filter-btn" data-filter="home">家居用品</button>
          <button class="filter-btn" data-filter="beauty">美妆护肤</button>
          <button class="filter-btn" data-filter="sports">运动户外</button>
        </div>
        <div class="filter-sort">
          <select id="sortSelect">
            <option value="default">默认排序</option>
            <option value="price-asc">价格从低到高</option>
            <option value="price-desc">价格从高到低</option>
            <option value="sales">销量优先</option>
          </select>
        </div>
      </div>

      <!-- 商品网格 -->
      <div class="product-grid" id="productGrid"></div>

      <!-- 分页 -->
      <div class="pagination">
        <a href="#" class="page-btn disabled">上一页</a>
        <a href="#" class="page-btn active">1</a>
        <a href="#" class="page-btn">2</a>
        <a href="#" class="page-btn">3</a>
        <a href="#" class="page-btn">下一页</a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-col">

          <ul>

            <li><a href="about.html#culture">企业文化</a></li>
            <li><a href="about.html#team">团队成员</a></li>
            <li><a href="about.html#careers">加入我们</a></li>
          </ul>
        </div>
        <div class="footer-col">
          <h4>客户服务</h4>
          <ul>
            <li><a href="help.html">帮助中心</a></li>
            <li><a href="shipping.html">配送说明</a></li>
            <li><a href="return.html">退换政策</a></li>
            <li><a href="contact.html">联系客服</a></li>
          </ul>
        </div>
        <div class="footer-col">
          <h4>支付方式</h4>
          <ul>
            <li><a href="payment.html">支付方式</a></li>
            <li><a href="coupon.html">优惠券</a></li>
            <li><a href="points.html">积分商城</a></li>
            <li><a href="giftcard.html">礼品卡</a></li>
          </ul>
        </div>
        <div class="footer-col">
          <h4>关注我们</h4>
          <div class="social-links">
            <a href="#" class="social-icon">📱</a>
            <a href="#" class="social-icon">💬</a>
            <a href="#" class="social-icon">📧</a>
          </div>

        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 云商科技版权所有 | <a href="privacy.html">隐私政策</a> | <a href="terms.html">服务条款</a></p>
      </div>
    </div>
  </footer>

  <!-- 购物车侧边栏 -->
  <div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h3>购物车</h3>
      <button class="cart-close" id="cartClose">×</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>合计：</span>
        <span id="cartTotal">¥0.00</span>
      </div>
      <a href="checkout.html" class="btn btn-primary btn-block">去结算</a>
    </div>
  </div>
  <div class="cart-overlay" id="cartOverlay"></div>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    let allProducts = [];
    let currentCategory = 'all';
    let currentSort = 'default';

    // 加载商品
    async function loadProductList() {
      try {
        const result = await API.Product.getList({ limit: 50 });
        if (result.success) {
          allProducts = result.data.map(p => ({
            id: p.id,
            name: p.name,
            brand: p.category,
            price: p.price,
            originalPrice: p.original_price,
            image: p.images && p.images[0] ? p.images[0] : 'https://via.placeholder.com/400x400?text=No+Image',
            category: p.category,
            tag: p.original_price ? 'sale' : null,
            description: p.description,
            stock: p.stock
          }));
          renderProductList();
        }
      } catch (error) {
        document.getElementById('productGrid').innerHTML = '<p style="text-align:center;padding:40px;color:#999;">商品加载失败，请刷新重试</p>';
      }
    }

    // 渲染商品列表
    function renderProductList() {
      let filtered = allProducts;
      
      if (currentCategory !== 'all') {
        filtered = filtered.filter(p => p.category === currentCategory);
      }

      // 排序
      if (currentSort === 'price-asc') {
        filtered.sort((a, b) => a.price - b.price);
      } else if (currentSort === 'price-desc') {
        filtered.sort((a, b) => b.price - a.price);
      }

      const grid = document.getElementById('productGrid');
      if (!grid) return;

      if (filtered.length === 0) {
        grid.innerHTML = '<p style="text-align:center;padding:40px;color:#999;">暂无该分类商品</p>';
        return;
      }

      grid.innerHTML = filtered.map(product => `
        <div class="product-card">
          <div class="product-image">
            <img src="${product.image}" alt="${product.name}" loading="lazy">
            ${product.tag ? `<span class="product-tag tag-${product.tag}">${getTagText(product.tag)}</span>` : ''}
            <div class="product-actions">
              <button class="btn-add-cart" onclick="addToCart(${product.id})">加入购物车</button>
            </div>
          </div>
          <div class="product-info">
            <p class="product-brand">${product.brand}</p>
            <h3 class="product-title">${product.name}</h3>
            <div class="product-price">
              <span class="price-current">¥${product.price}</span>
              ${product.originalPrice ? `<span class="price-original">¥${product.originalPrice}</span>` : ''}
            </div>
          </div>
        </div>
      `).join('');
    }

    function getTagText(tag) {
      return { 'new': '新品', 'hot': '热门', 'sale': '特惠' }[tag] || '';
    }

    function addToCart(productId) {
      const product = allProducts.find(p => p.id === productId);
      if (!product) return;
      API.Cart.addItem({
        id: product.id,
        name: product.name,
        price: product.price,
        image: product.image,
        brand: product.brand
      });
      showToast('已添加到购物车');
    }

    function showToast(message, type = 'success') {
      let toast = document.querySelector('.toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:#10b981;color:white;padding:12px 24px;border-radius:8px;font-size:14px;opacity:0;transition:all 0.3s;z-index:9999;';
        document.body.appendChild(toast);
      }
      toast.textContent = message;
      toast.style.background = type === 'error' ? '#ef4444' : '#10b981';
      toast.style.transform = 'translateX(-50%) translateY(0)';
      toast.style.opacity = '1';
      setTimeout(() => {
        toast.style.transform = 'translateX(-50%) translateY(-100px)';
        toast.style.opacity = '0';
      }, 2500);
    }

    // 筛选按钮
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentCategory = this.dataset.filter;
        renderProductList();
      });
    });

    // 排序
    document.getElementById('sortSelect')?.addEventListener('change', function() {
      currentSort = this.value;
      renderProductList();
    });

    // 用户状态
    function initUserUI() {
      const user = API.User.getCurrentUser();
      const userIcon = document.querySelector('.user-icon');
      if (user && userIcon) {
        userIcon.href = '#';
        userIcon.title = `已登录: ${user.username}`;
        userIcon.onclick = (e) => {
          e.preventDefault();
          if (confirm('是否退出登录？')) {
            API.User.logout();
            window.location.reload();
          }
        };
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      initUserUI();
      loadProductList();
    });
  </script>
</body>
</html>
